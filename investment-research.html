<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Investment Research – Karsin Dass</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>
<body>
  <nav class="nav-bar">
    <a href="index.html">Home</a>
    <a href="coursework.html">Coursework</a>
    <a href="investment-research.html">Investment Research</a>
  </nav>

  <button id="theme-toggle" class="toggle" onclick="toggleTheme()">🌙</button>

  <div class="section">
    <h2>Investment Research</h2>
    <p>My investment analysis and current performance tracking.</p>
  </div>

  <div class="section">
    <h3>Portfolio</h3>
    <div class="experience-cards" id="investment-cards">
      <!-- Investment cards will be dynamically generated here -->
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById("theme-toggle");

    // Apply saved theme and update icon on load
    const currentTheme = localStorage.getItem("theme");
    if (currentTheme === "light") {
      document.body.classList.add("light");
      toggleBtn.textContent = "🌙";
    } else {
      toggleBtn.textContent = "☀️";
    }

    function toggleTheme() {
      document.body.classList.toggle("light");

      if (document.body.classList.contains("light")) {
        localStorage.setItem("theme", "light");
        toggleBtn.textContent = "🌙";
      } else {
        localStorage.setItem("theme", "dark");
        toggleBtn.textContent = "☀️";
      }
    }

    // Investment data
    const investments = [
      {
        ticker: "CHWY",
        name: "Chewy",
        purchasePrice: 31.76,
        purchaseDate: "2024",
        reportPath: "Investment Research/Chewy/Chewy.docx",
        dcfPath: "Investment Research/Chewy/Chewy DCF.xlsx"
      }
      // Add more investments here as needed
    ];

    // Function to fetch stock price from Yahoo Finance
    async function fetchStockPrice(ticker) {
      try {
        // Using Yahoo Finance API endpoint with CORS proxy
        const proxyUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
        const response = await fetch(proxyUrl, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
          },
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data.chart && data.chart.result && data.chart.result[0]) {
          const quote = data.chart.result[0].meta;
          return quote.regularMarketPrice;
        }
        throw new Error("Invalid response");
      } catch (error) {
        console.error(`Error fetching price for ${ticker}:`, error);
        // Fallback: try alternative endpoint
        try {
          const response = await fetch(`https://query2.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=price`, {
            method: 'GET',
            headers: {
              'Accept': 'application/json',
            },
          });
          
          if (response.ok) {
            const data = await response.json();
            if (data.quoteSummary && data.quoteSummary.result && data.quoteSummary.result[0]) {
              return data.quoteSummary.result[0].price.regularMarketPrice.raw;
            }
          }
        } catch (e) {
          console.error(`Fallback also failed for ${ticker}:`, e);
        }
        return null;
      }
    }

    // Function to calculate gain percentage
    function calculateGain(currentPrice, purchasePrice) {
      const gain = currentPrice - purchasePrice;
      const gainPercent = (gain / purchasePrice) * 100;
      return { gain, gainPercent };
    }

    // Function to format currency
    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(value);
    }

    // Function to create investment card
    function createInvestmentCard(investment, currentPrice) {
      const { gain, gainPercent } = calculateGain(currentPrice, investment.purchasePrice);
      const isPositive = gain >= 0;
      const gainColor = isPositive ? '#4caf50' : '#f44336';
      
      return `
        <div class="experience-card investment-card">
          <h4>${investment.name} (${investment.ticker})</h4>
          <div class="investment-price">
            <div class="price-row">
              <span class="price-label">Purchase Price:</span>
              <span class="price-value">${formatCurrency(investment.purchasePrice)}</span>
            </div>
            <div class="price-row">
              <span class="price-label">Current Price:</span>
              <span class="price-value">${formatCurrency(currentPrice)}</span>
            </div>
            <div class="price-row gain-row">
              <span class="price-label">Gain/Loss:</span>
              <span class="price-value" style="color: ${gainColor};">
                ${isPositive ? '+' : ''}${formatCurrency(gain)} (${isPositive ? '+' : ''}${gainPercent.toFixed(2)}%)
              </span>
            </div>
          </div>
          <div class="investment-links" style="margin-top: 15px;">
            <a href="${investment.reportPath}" target="_blank" style="display: block; margin-bottom: 8px;">📄 Read Report</a>
            <a href="${investment.dcfPath}" target="_blank" style="display: block;">📊 View DCF</a>
          </div>
        </div>
      `;
    }

    // Function to create loading card
    function createLoadingCard(ticker) {
      return `
        <div class="experience-card investment-card">
          <h4>${ticker}</h4>
          <p>Loading price data...</p>
        </div>
      `;
    }

    // Function to create error card
    function createErrorCard(investment) {
      return `
        <div class="experience-card investment-card">
          <h4>${investment.name} (${investment.ticker})</h4>
          <p style="color: var(--secondary-text-color);">Unable to fetch current price</p>
          <div class="investment-links" style="margin-top: 15px;">
            <a href="${investment.reportPath}" target="_blank" style="display: block; margin-bottom: 8px;">📄 Read Report</a>
            <a href="${investment.dcfPath}" target="_blank" style="display: block;">📊 View DCF</a>
          </div>
        </div>
      `;
    }

    // Load investment cards
    async function loadInvestmentCards() {
      const container = document.getElementById("investment-cards");
      
      // Show loading state
      container.innerHTML = investments.map(inv => createLoadingCard(inv.ticker)).join('');
      
      // Fetch prices and create cards
      const cardPromises = investments.map(async (investment) => {
        const currentPrice = await fetchStockPrice(investment.ticker);
        
        if (currentPrice !== null) {
          return createInvestmentCard(investment, currentPrice);
        } else {
          return createErrorCard(investment);
        }
      });
      
      const cards = await Promise.all(cardPromises);
      container.innerHTML = cards.join('');
    }

    // Load cards when page loads
    loadInvestmentCards();
  </script>

</body>
</html>
